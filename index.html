    const Clock = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>);
    const Download = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
    const Upload = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>);
    const CheckCircle = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
    const XCircle = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>);
    const X = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
    const Info = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);

    // --- Gemini API & Utilities ---
    const callGeminiApi = async (userApiKey, userQuery, systemPrompt, useSearch = false) => {
        let finalKey = userApiKey;
        if (!finalKey && typeof API_KEY !== 'undefined') {
            finalKey = API_KEY;
        }
        if (!finalKey) throw new Error("請先設定 Gemini API Key");
        
        // 💎 已更新至最新、最強的 gemini-2.5-flash 模型
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${finalKey}`;
        const payload = {
            contents: [{ parts: [{ text: userQuery }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
        };
        
        if (useSearch) payload.tools = [{ "googleSearch": {} }];

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const errMsg = errData.error?.message || '未知錯誤';
            
            if (response.status === 429) {
                throw new Error("API 額度暫滿 (429)，請稍等 1 分鐘後再試！☕");
            } else if (response.status === 400) {
                throw new Error(`設定錯誤 (400): ${errMsg}`);
            } else if (response.status === 404) {
                throw new Error(`模型已停用 (404): 請更新程式碼裡的 API 模型名稱`);
            } else if (response.status === 403) {
                throw new Error(`權限不足 (403): 請確認 API Key 是否正確`);
            }
            throw new Error(`連線失敗 (${response.status}): ${errMsg}`);
        }

        const data = await response.json();
        const candidate = data.candidates?.[0];
        if (candidate && candidate.content?.parts?.[0]?.text) {
            const text = candidate.content.parts[0].text;
            let sources = [];
            if (candidate.groundingMetadata?.groundingAttributions) {
                sources = candidate.groundingMetadata.groundingAttributions
                    .map(a => ({ uri: a.web?.uri, title: a.web?.title }))
                    .filter(s => s.uri && s.title);
            }
            return { text, sources };
        }
        throw new Error("API 回傳空白內容");
    };

    // --- Technical Indicators Logic ---
    const lastValid = (arr) => {
      if (!arr || !arr.length) return null;
      for (let i = arr.length - 1; i >= 0; i--) {
        if (typeof arr[i] === "number" && !isNaN(arr[i])) return arr[i];
      }
      return null;
    };
    const avgTail = (arr, n) => {
      const a = arr.slice(-n).filter(x => typeof x === "number" && !isNaN(x));
      if (!a.length) return 0;
      return a.reduce((p, c) => p + c, 0) / a.length;
    };
    const calcRSI = (closes, len) => {
      if (closes.length < len + 1) return 50;
      let g = 0, l = 0;
      for (let i = closes.length - (len + 1); i < closes.length - 1; i++) {
        const d = closes[i + 1] - closes[i];
        if (d > 0) g += d; else l -= d;
      }
      const ag = g / len, al = l / len;
      const rs = (al === 0) ? 100 : ag / al;
      return 100 - (100 / (1 + rs));
    };
    const emaSeries = (arr, span) => {
      if (arr.length === 0) return [];
      const k = 2 / (span + 1);
      let e = arr[0];
      const out = [e];
      for (let i = 1; i < arr.length; i++) {
        e = arr[i] * k + e * (1 - k);
        out.push(e);
      }
      return out;
    };
    const calcMACD = (closes) => {
      if (closes.length < 35) return { macd: 0, signal: 0, hist: 0 };
      const ema12 = emaSeries(closes, 12);
      const ema26 = emaSeries(closes, 26);
      const validMacdLine = [];
      for(let i=0; i<closes.length; i++) {
          if(i < 25) { validMacdLine.push(0); } 
          else { validMacdLine.push(ema12[i] - (ema26[i] || 0)); }
      }
      const signalLine = emaSeries(validMacdLine, 9);
      const macd = validMacdLine.at(-1);
      const signal = signalLine.at(-1);
      return { macd, signal, hist: macd - signal };
    };
    const lastPivotHigh = (highs, lb = 5) => {
      for (let i = highs.length - lb - 1; i >= lb; i--) {
        let ok = true;
        for (let k = 1; k <= lb; k++) {
          if (highs[i] <= highs[i - k] || highs[i] <= highs[i + k]) { ok = false; break; }
        }
        if (ok) return highs[i];
      }
      return null;
    };
    const lastPivotLow = (lows, lb = 5) => {
      for (let i = lows.length - lb - 1; i >= lb; i--) {
        let ok = true;
        for (let k = 1; k <= lb; k++) {
          if (lows[i] >= lows[i - k] || lows[i] >= lows[i + k]) { ok = false; break; }
        }
        if (ok) return lows[i];
      }
      return null;
    };
    const detectFalseBreakout = (highs, lows, closes, vols, tol = 0.001, volMul = 1.2) => {
      const safeMax = highs.slice(-20).length > 0 ? Math.max(...highs.slice(-20)) : 0;
      const safeMin = lows.slice(-20).length > 0 ? Math.min(...lows.slice(-20)) : 0;
      const res = lastPivotHigh(highs) ?? safeMax;
      const sup = lastPivotLow(lows) ?? safeMin;
      const h = highs.at(-1), l = lows.at(-1), c = closes.at(-1);
      const v = vols.at(-1) || 0, avgV = avgTail(vols, 10);
      const bear = (h > res * (1 + tol)) && (c < res) && (v < avgV * volMul);
      const bull = (l < sup * (1 - tol)) && (c > sup) && (v < avgV * volMul);
      return { bear, bull };
    };

    // --- Candlestick Chart ---
    const CandlestickChart = ({ data }) => {
        if (!data || data.closes.length === 0) return null;
        const count = data.closes.length;
        const displayCount = Math.min(count, 40);
        const startIndex = count - displayCount;
        const slicedOpens = data.opens.slice(startIndex);
        const slicedHighs = data.highs.slice(startIndex);
        const slicedLows = data.lows.slice(startIndex);
        const slicedCloses = data.closes.slice(startIndex);

        const maxPrice = Math.max(...slicedHighs);
        const minPrice = Math.min(...slicedLows);
        const range = maxPrice - minPrice || 1;
        const padding = range * 0.1;
        const plotMax = maxPrice + padding;
        const plotMin = minPrice - padding;
        const plotRange = plotMax - plotMin;

        const chartW = 300;
        const chartH = 150;
        const candleWidth = (chartW / displayCount) * 0.5;

            <div className="w-full h-40 mt-2 relative">
                <svg viewBox={`0 0 ${chartW} ${chartH}`} className="w-full h-full" preserveAspectRatio="none">

                        <line key={p} x1="0" y1={chartH * p} x2={chartW} y2={chartH * p} className="stroke-ios-gray3" strokeWidth="0.5" strokeDasharray="3 3" />
                    ))}

                    {slicedCloses.map((close, i) => {
                        const open = slicedOpens[i];
                        const high = slicedHighs[i];
                        const low = slicedLows[i];
                        const x = i * spacing + (spacing - candleWidth) / 2;
                        const yHigh = chartH - ((high - plotMin) / plotRange) * chartH;
                        const yLow = chartH - ((low - plotMin) / plotRange) * chartH;
                        const yOpen = chartH - ((open - plotMin) / plotRange) * chartH;
                        const yClose = chartH - ((close - plotMin) / plotRange) * chartH;
                        
                        const isUp = close >= open;
                        const displayColor = isUp ? "#FF453A" : "#30D158"; 
                        
                        return (
                            <g key={i}>
                                <line x1={x + candleWidth/2} y1={yHigh} x2={x + candleWidth/2} y2={yLow} stroke={displayColor} strokeWidth="1" strokeLinecap="round"/>
                                <rect x={x} y={Math.min(yOpen, yClose)} width={candleWidth} height={Math.abs(yClose - yOpen) || 1} fill={displayColor} rx="1" />
                            </g>
                        );
                    })}

      const timestamps = [];
      const closes = [], highs = [], lows = [], opens = [], vols = [];
      let price = (parseInt(code) || 100) % 500 + 50; 
      if (price < 10) price = 100;
      for(let i=0; i<count; i++) {
        const time = new Date(now);
        time.setDate(now.getDate() - (count - i));
        timestamps.push(Math.floor(time.getTime() / 1000));
        const change = (Math.random() - 0.5) * price * 0.05; 
        const open = price;
        const close = price + change;
        const high = Math.max(open, close) + Math.random() * price * 0.02;
        const low = Math.min(open, close) - Math.random() * price * 0.02;
        const vol = Math.floor(Math.random() * 5000 + 1000);
        opens.push(open); closes.push(close); highs.push(high); lows.push(low); vols.push(vol);
        price = close;
      }
      return { chart: { result: [{ meta: { currency: "TWD", symbol: `${code}.TW` }, timestamp: timestamps, indicators: { quote: [{ open: opens, high: highs, low: lows, close: closes, volume: vols }] } }] } };

              onSignalUpdate(code, data.signalType);

      }, [data?.signalType, code, onSignalUpdate]);

      const fetchData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          let chartData = null; 
          let stockName = code;
          
          // 💡 升級版：自動切換 Yahoo 的 query1 與 query2 伺服器
          const fetchYahooData = async (suffix) => {
             const domains = ['query1.finance.yahoo.com', 'query2.finance.yahoo.com'];
             for (const domain of domains) {
                 try {
                     const res = await fetchWithProxy(`https://${domain}/v8/finance/chart/${code}${suffix}?interval=1d&range=3mo`);
                     if (res && res.chart && res.chart.result && res.chart.result[0].indicators.quote[0].close && res.chart.result[0].indicators.quote[0].close.length > 0) {
                         return res;
                     }
                 } catch(e) { continue; } // 如果這台主機擋連線，自動換下一台
             }
             return null;
          };

          chartData = await fetchYahooData('.TW');
          if (!chartData) chartData = await fetchYahooData('.TWO');
          if (!chartData) throw new Error("API fail");

          try {
            const nameRes = await fetchStockName(code);
            if (nameRes) stockName = nameRes;
          } catch (e) { console.log("Name fetch failed"); }

          const result = chartData.chart?.result?.[0];
          const quote = result.indicators.quote[0];
          const closes = (quote.close || []).filter(n => typeof n === "number");
          const opens = (quote.open || []).filter(n => typeof n === "number");
          const highs = (quote.high || []).filter(n => typeof n === "number");
          const lows = (quote.low || []).filter(n => typeof n === "number");
          const vols = (quote.volume || []).filter(n => typeof n === "number");

          if (closes.length < 5) throw new Error("數據不足");

          const lastClose = lastValid(closes);
          const volume = lastValid(vols);
          
          const rsi14 = calcRSI(closes, 14);
          const rsi28 = calcRSI(closes, 28); 
          const ma20 = avgTail(closes, 20);
          const trend = (lastClose >= ma20) ? 1 : -1;
          const avgV10 = avgTail(vols, 10);
          const volStrength = (volume > avgV10 * 1.1) ? 1 : -1; 

          const { macd, signal, hist } = calcMACD(closes); 
          const fb = detectFalseBreakout(highs, lows, closes, vols);
          
          const marketTrend = 1; 

          const tech = (rsi14 < 40 && rsi28 < 45) ? 0.2 : (rsi14 > 70 && rsi28 > 65) ? 0.8 : 0.5;
          let score = (0.6 * tech) +
                      (0.2 * (trend === 1 ? 0.7 : 0.3)) +
                      (0.1 * (volStrength === 1 ? 0.7 : 0.3)) +
                      (0.1 * (marketTrend === 1 ? 0.7 : 0.3));

          score += (hist > 0 ? +0.05 : -0.05);
          if (fb.bear) score -= 0.15;
          if (fb.bull) score += 0.10;
          score = Math.max(0, Math.min(1, score));
          
          const conf = Math.round(score * 100);
          
          let signalText = "觀望";
          let signalType = "neutral";
          if (score <= 0.35) { signalText = "買進區"; signalType = "buy"; }
          else if (score >= 0.65) { signalText = "賣出區"; signalType = "sell"; }

          setData({

            change: lastClose - closes[closes.length-2],
            rsi: rsi14.toFixed(1), conf, signal: signalText, signalType,
            details: { ma20, hist, macd, signalLine: signal, volume: lastValid(vols), fb, avgV10, volStrength },
            history: { opens, highs, lows, closes }

      const runAI = async (type) => {

          if (type === 'news') { setIsLlmLoading(true); setLlmSummary(null); }

          try {

              let system = "你是一位專業簡潔的台股分析師";

                  prompt = `簡述 ${data.name} (${data.code}) 近期重大財經新聞與財報重點 (50字內)。`;

                  prompt = `你是台股技術分析師。請根據 ${data.name} (${data.code}) 的數據：收盤價 ${data.price}，近期最高價 ${recentHigh}，近期最低價 ${recentLow}。請預測短線的「關鍵支撐」與「關鍵壓力」價位。回答格式範例：支撐 100.0 / 壓力 110.0。字數 30 字內。`;
              } else if (type === 'risk') {
                  const macdStatus = data.details.hist > 0 ? '翻紅(多方)' : '翻綠(空方)';
                  prompt = `你是風險控管專家。根據 ${data.name} (${data.code}) 數據：RSI ${data.rsi}, MACD ${macdStatus}。請評估短線操作風險等級（低/中/高）並簡述原因。回答範例：風險：高 (RSI過熱)。字數 30 字內。`;

              const res = await callGeminiApi(apiKey, prompt, system, isSearch);
              
              if (type === 'news') setLlmSummary(res);
              else if (type === 'strategy') setStrategy(res.text);
              else if (type === 'levels') setKeyLevels(res.text);

                                            <Sparkles size={12} className="text-ios-gray"/>
                                            <span className="text-[11px] font-bold text-ios-gray uppercase">新聞重點</span>
                                        </div>
                                        <p className="text-[14px] leading-relaxed text-ios-subtext">{llmSummary.text}</p>

                                        </div>
                                        <p className="text-[14px] leading-relaxed text-ios-subtext">{strategy}</p>

                                {keyLevels && (

                                        <div className="flex items-center gap-1.5 mb-1">
                                            <Target size={12} className="text-ios-orange"/>
                                            <span className="text-[11px] font-bold text-ios-orange uppercase">關鍵價位</span>
                                        </div>
                                        <p className="text-[14px] leading-relaxed text-ios-subtext font-medium">{keyLevels}</p>
                                    </div>
                                )}
                                {riskAssessment && (
                                    <div className="last:mb-0 pt-2 border-t border-ios-separator">
                                        <div className="flex items-center gap-1.5 mb-1">
                                            <ShieldAlert size={12} className="text-ios-purple"/>
                                            <span className="text-[11px] font-bold text-ios-purple uppercase">風險評估</span>
                                        </div>
                                        <p className="text-[14px] leading-relaxed text-ios-subtext font-medium">{riskAssessment}</p>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="mt-4">
                            <div className="flex bg-ios-gray6 dark:bg-ios-gray5 p-1 rounded-[10px]">
                                <button 
                                    onClick={() => toggleTab('chart')}
                                    className={`flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-[8px] text-[13px] font-medium transition-all ${activeTab === 'chart' ? 'bg-white dark:bg-ios-gray2 text-black dark:text-white shadow-sm' : 'text-ios-gray hover:text-ios-text'}`}
                                >
                                    <BarChart2 size={14}/> K線圖
                                </button>
                                <button 
                                    onClick={() => toggleTab('details')}
                                    className={`flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-[8px] text-[13px] font-medium transition-all ${activeTab === 'details' ? 'bg-white dark:bg-ios-gray2 text-black dark:text-white shadow-sm' : 'text-ios-gray hover:text-ios-text'}`}
                                >
                                    <List size={14}/> 詳細數據
                                </button>
                            </div>
                            
                            <div className="flex justify-between items-center mt-2 px-1">

                                    <button onClick={(e) => { e.stopPropagation(); onDelete(code); setShowModal(false); }} className="text-ios-gray hover:text-ios-red transition-colors flex items-center gap-1 text-[11px] font-medium"><Trash2 size={12}/> 移除</button>

                                            </span>

                                            <span className="text-ios-gray block mb-0.5">成交量</span>

                                                {Math.floor(data.details.volume/1000).toLocaleString()}張

                                            <span className="text-ios-gray block mb-0.5">MACD</span>

                                        <div>
                                            <span className="text-ios-gray block mb-0.5">訊號線 (9EMA)</span>
                                            <span className="font-semibold text-ios-text">{data.details.signalLine.toFixed(2)}</span>

                                    <div className="mt-2 p-3 bg-ios-gray6 dark:bg-ios-gray5 rounded-xl border border-transparent dark:border-white/5">

    };

    const App = () => {
      const [inputCode, setInputCode] = useState("");
      const [stocks, setStocks] = useState(() => {
          const saved = localStorage.getItem("myStocks");
          return saved ? JSON.parse(saved) : ["2330", "2317", "0050"];
      });
      const [stockSignals, setStockSignals] = useState({});

      const [apiKey, setApiKey] = useState(() => localStorage.getItem("gemini_api_key") || "");
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isInfoOpen, setIsInfoOpen] = useState(false);
      const [theme, setTheme] = useState(() => localStorage.getItem("theme") || "light"); 
      const [toast, setToast] = useState({ message: '', type: 'success', visible: false });

      const showToast = useCallback((message, type = 'success') => {
          setToast({ message, type, visible: true });
          setTimeout(() => setToast(prev => ({ ...prev, visible: false })), 3000);
      }, []);

      const handleSignalUpdate = useCallback((code, type) => {
          setStockSignals(prev => {
              if (prev[code] === type) return prev; 
              return { ...prev, [code]: type };
          });
      }, []);

      const sortedStocks = useMemo(() => {
          return [...stocks].sort((a, b) => {
              const typeA = stockSignals[a];
              const typeB = stockSignals[b];
              
              const getScore = (type) => {
                  if (type === 'buy' || type === 'sell') return 2;
                  if (type === 'neutral') return 1;
                  return 0;
              };

              const scoreA = getScore(typeA);
              const scoreB = getScore(typeB);

              if (scoreA !== scoreB) return scoreB - scoreA;
              
              return stocks.indexOf(a) - stocks.indexOf(b);
          });
      }, [stocks, stockSignals]);

      useEffect(() => {
        localStorage.setItem("myStocks", JSON.stringify(stocks));
      }, [stocks]);

      useEffect(() => {
        const root = window.document.body;
        if (theme === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        localStorage.setItem("theme", theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(prev => prev === 'dark' ? 'light' : 'dark');
      };

      const addStock = (e) => {
        e.preventDefault();
        const code = inputCode.trim();
        if (code && !stocks.includes(code)) {
          setStocks(prev => [code, ...prev]);
          setInputCode("");
          showToast(`已加入 ${code}`, 'success');
        } else if (stocks.includes(code)) {
            showToast(`${code} 已經在清單中`, 'error');
        }
      };

      const removeStock = (code) => {
        setStocks(prev => prev.filter(s => s !== code));
        showToast(`已移除 ${code}`, 'success');
      };

      return (
        <div className="min-h-screen pb-10 max-w-md mx-auto pt-safe-top">

                 <p className="text-[13px] text-ios-subtext font-medium">台股 AI 戰略觀察</p>
              </div>
              <div className="flex gap-3">

                    <Info size={20} />

                    <Settings size={20} />

              </div>
           </header>

                    type="text" 
                    value={inputCode}
                    onChange={(e) => setInputCode(e.target.value)}
                    placeholder="輸入股票代號 (例如: 2330)"
                    className="w-full bg-ios-card h-12 rounded-[14px] pl-4 pr-12 text-[17px] shadow-sm focus:outline-none focus:ring-2 focus:ring-ios-blue/50 transition-all text-ios-text placeholder-ios-gray3"
                 />
                 <button 
                    type="submit"
                    disabled={!inputCode}
                    className="absolute right-2 top-2 bottom-2 w-8 h-8 bg-ios-blue rounded-[10px] flex items-center justify-center text-white disabled:opacity-50 disabled:bg-ios-gray4 transition-all active:scale-90"
                 >
                    <Plus size={20} strokeWidth={3} />
                 </button>
              </form>
           </div>

           <div className="px-4 space-y-5">
              {sortedStocks.length === 0 ? (
                 <div className="text-center py-20 opacity-50">
                    <div className="w-20 h-20 bg-ios-gray5 rounded-full mx-auto flex items-center justify-center mb-4">
                        <BarChart2 size={32} className="text-ios-gray3"/>
                    </div>
                    <p className="text-ios-gray text-lg font-medium">尚未加入觀察名單</p>
                    <p className="text-ios-gray text-sm mt-1">請上方輸入代號加入</p>
                 </div>
              ) : (
                 sortedStocks.map(code => (
                    <StockCard 
                       key={code} 
                       code={code} 
                       onDelete={removeStock} 
                       apiKey={apiKey}
                       openSettings={() => setIsSettingsOpen(true)}
                       showToast={showToast}
                       onSignalUpdate={handleSignalUpdate}
                    />
                 ))
              )}
           </div>

           <InfoModal
              isOpen={isInfoOpen}
              onClose={() => setIsInfoOpen(false)}
           />

           <SettingsModal 
              isOpen={isSettingsOpen} 
              onClose={() => setIsSettingsOpen(false)}
              apiKey={apiKey}
              setApiKey={setApiKey}
              stocks={stocks}
              setStocks={setStocks}
              showToast={showToast}
           />
           
           <div className="text-center mt-10 text-[11px] text-ios-gray3 pb-safe">
              資料來源: Yahoo Finance & TWSE <br/> AI 分析僅供參考，投資請謹慎
           </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
