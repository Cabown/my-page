<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿彬戰情室 -0626更新UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Helvetica Neue', 'Inter', 'Noto Sans TC', 'sans-serif'],
            },
            colors: {
              apple: {
                bg: '#000000',
                card: '#151516',
                border: 'rgba(255, 255, 255, 0.08)',
                text: '#F5F5F7',
                subtext: '#86868B',
                blue: '#0A84FF',
                orange: '#FF9F0A',
                purple: '#BF5AF2'
              }
            },
            backgroundImage: {
              'gradient-m1': 'linear-gradient(90deg, #A8BFFF 0%, #884DFF 50%, #FF6B8B 100%)',
              'gradient-green': 'linear-gradient(135deg, #2AF598 0%, #009EFD 100%)',
              'gradient-red': 'linear-gradient(135deg, #FF6A00 0%, #EE0979 100%)',
              'gradient-blue': 'linear-gradient(135deg, #5AC8FA 0%, #007AFF 100%)',
              'gradient-orange': 'linear-gradient(135deg, #FFD3A5 0%, #FD6585 100%)',
            },
            animation: {
              'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
              'fade-in': 'fadeIn 0.2s ease-out',
            },
            keyframes: {
              scaleIn: { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #000000; color: #F5F5F7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .bento-card { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease; }
      .bento-card:hover { transform: scale(1.02); background-color: #1c1c1e; }
      .text-gradient { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // --- 圖示 ---
    const Brain = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 16v-4"></path><path d="M12 8h.01"></path><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg>);
    const Sparkles = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/></svg>);
    const XCircle = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>);
    const X = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
    const Target = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>);
    const ShieldAlert = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
    const Clock = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>);
    const RefreshCw = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.5 15a9 9 0 0 1 14.8-8.2l-2.4 2.3"></path><path d="M20.5 9a9 9 0 0 1-14.8 8.2l2.4-2.3"></path></svg>);
    const Trash2 = ({ size = 20, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>);

    // --- 真實 API 與技術指標 ---
    const callGeminiApi = async (userApiKey, userQuery, systemPrompt, useSearch = false) => {
        let finalKey = userApiKey || (typeof API_KEY !== 'undefined' ? API_KEY : null);
        if (!finalKey) throw new Error("請先設定 Gemini API Key");
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${finalKey}`;
        const payload = { contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
        if (useSearch) payload.tools = [{ "googleSearch": {} }];
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!response.ok) throw new Error("AI API 連線失敗");
        const data = await response.json();
        return { text: data.candidates?.[0]?.content?.parts?.[0]?.text || "" };
    };

    const fetchWithProxy = async (targetUrl) => {
      const proxies = [
        (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];
      for (const proxyGen of proxies) {
        try { const res = await fetch(proxyGen(targetUrl)); if (res.ok) return await res.json(); } catch (e) {}
      }
      throw new Error("All proxies failed");
    };

    const fetchStockName = async (code) => {
      const stockNames = {
        "2330": "台積電", "2317": "鴻海", "0050": "元大台灣50", 
        "0056": "元大高股息", "2454": "聯發科", "2603": "長榮", 
        "2382": "廣達", "3231": "緯創", "2303": "聯電", 
        "2881": "富邦金", "2891": "中信金", "00878": "國泰永續高息",
        "00919": "群益精選高息", "00929": "復華科技優息",
        "00940": "元大價值高息", "2308": "台達電"
      };
      if (stockNames[code]) return stockNames[code];

      try {
        let data = await fetchWithProxy(`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${code}.tw&json=1&delay=0`);
        if (data?.msgArray?.[0]?.n) return data.msgArray[0].n;
        data = await fetchWithProxy(`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=otc_${code}.tw&json=1&delay=0`);
        return data?.msgArray?.[0]?.n || code;
      } catch { return code; }
    };

    const lastValid = (arr) => { for (let i = arr.length - 1; i >= 0; i--) if (typeof arr[i] === "number" && !isNaN(arr[i])) return arr[i]; return null; };
    const avgTail = (arr, n) => { const a = arr.slice(-n).filter(x => typeof x === "number" && !isNaN(x)); return a.length ? a.reduce((p, c) => p + c, 0) / a.length : 0; };
    const calcRSI = (closes, len) => {
      if (closes.length < len + 1) return 50;
      let g = 0, l = 0;
      for (let i = closes.length - (len + 1); i < closes.length - 1; i++) { const d = closes[i + 1] - closes[i]; if (d > 0) g += d; else l -= d; }
      const rs = (l === 0) ? 100 : (g / len) / (l / len);
      return 100 - (100 / (1 + rs));
    };
    const emaSeries = (arr, span) => {
      if (arr.length === 0) return [];
      const k = 2 / (span + 1);
      let e = arr[0]; const out = [e];
      for (let i = 1; i < arr.length; i++) { e = arr[i] * k + e * (1 - k); out.push(e); }
      return out;
    };
    const calcMACD = (closes) => {
      if (closes.length < 35) return { macd: 0, signal: 0, hist: 0 };
      const ema12 = emaSeries(closes, 12);
      const ema26 = emaSeries(closes, 26);
      const validMacdLine = [];
      for(let i=0; i<closes.length; i++) {
          if(i < 25) { validMacdLine.push(0); } else { validMacdLine.push(ema12[i] - (ema26[i] || 0)); }
      }
      const signalLine = emaSeries(validMacdLine, 9);
      const macd = validMacdLine.at(-1);
      const signal = signalLine.at(-1);
      return { macd, signal, hist: macd - signal };
    };
    const lastPivotHigh = (highs, lb = 5) => {
      for (let i = highs.length - lb - 1; i >= lb; i--) {
        let ok = true;
        for (let k = 1; k <= lb; k++) { if (highs[i] <= highs[i - k] || highs[i] <= highs[i + k]) { ok = false; break; } }
        if (ok) return highs[i];
      } return null;
    };
    const lastPivotLow = (lows, lb = 5) => {
      for (let i = lows.length - lb - 1; i >= lb; i--) {
        let ok = true;
        for (let k = 1; k <= lb; k++) { if (lows[i] >= lows[i - k] || lows[i] >= lows[i + k]) { ok = false; break; } }
        if (ok) return lows[i];
      } return null;
    };
    const detectFalseBreakout = (highs, lows, closes, vols, tol = 0.001, volMul = 1.2) => {
      const safeMax = highs.slice(-20).length > 0 ? Math.max(...highs.slice(-20)) : 0;
      const safeMin = lows.slice(-20).length > 0 ? Math.min(...lows.slice(-20)) : 0;
      const res = lastPivotHigh(highs) ?? safeMax;
      const sup = lastPivotLow(lows) ?? safeMin;
      const h = highs.at(-1), l = lows.at(-1), c = closes.at(-1);
      const v = vols.at(-1) || 0, avgV = avgTail(vols, 10);
      const bear = (h > res * (1 + tol)) && (c < res) && (v < avgV * volMul);
      const bull = (l < sup * (1 - tol)) && (c > sup) && (v < avgV * volMul);
      return { bear, bull };
    };

    // --- 動態縮放 K線圖元件 ---
    const CandlestickChart = ({ data }) => {
        if (!data || data.closes.length === 0) return null;
        const count = data.closes.length;
        const displayCount = Math.min(count, 40);
        const startIndex = count - displayCount;
        const slicedOpens = data.opens.slice(startIndex);
        const slicedHighs = data.highs.slice(startIndex);
        const slicedLows = data.lows.slice(startIndex);
        const slicedCloses = data.closes.slice(startIndex);

        const maxPrice = Math.max(...slicedHighs);
        const minPrice = Math.min(...slicedLows);
        const range = maxPrice - minPrice || 1;
        const padding = range * 0.1;
        const plotMax = maxPrice + padding;
        const plotMin = minPrice - padding;
        const plotRange = plotMax - plotMin;

        const chartW = 1200; const chartH = 400;
        const candleWidth = (chartW / displayCount) * 0.4;
        const spacing = chartW / displayCount;

        return (
            <div className="w-full h-full relative flex-1 min-h-[180px] lg:min-h-0">
                <svg viewBox={`0 0 ${chartW} ${chartH}`} className="w-full h-full absolute inset-0" preserveAspectRatio="none">
                    {[0.2, 0.4, 0.6, 0.8].map(p => (
                        <line key={p} x1="0" y1={chartH * p} x2={chartW} y2={chartH * p} className="stroke-white/10" strokeWidth="1" strokeDasharray="6 6" />
                    ))}
                    {slicedCloses.map((close, i) => {
                        const open = slicedOpens[i];
                        const high = slicedHighs[i];
                        const low = slicedLows[i];
                        const x = i * spacing + (spacing - candleWidth) / 2;
                        const yHigh = chartH - ((high - plotMin) / plotRange) * chartH;
                        const yLow = chartH - ((low - plotMin) / plotRange) * chartH;
                        const yOpen = chartH - ((open - plotMin) / plotRange) * chartH;
                        const yClose = chartH - ((close - plotMin) / plotRange) * chartH;
                        
                        const isUp = close >= open;
                        const displayColor = isUp ? "#FF453A" : "#30D158"; 
                        
                        return (
                            <g key={i}>
                                <line x1={x + candleWidth/2} y1={yHigh} x2={x + candleWidth/2} y2={yLow} stroke={displayColor} strokeWidth="2" strokeLinecap="round"/>
                                <rect x={x} y={Math.min(yOpen, yClose)} width={candleWidth} height={Math.abs(yClose - yOpen) || 1} fill={displayColor} rx="2" />
                            </g>
                        );
                    })}
                </svg>
                <div className="absolute right-0 top-0 bottom-0 flex flex-col justify-between text-[11px] md:text-sm text-gray-500 py-1 pointer-events-none font-bold">
                     <span>{maxPrice.toFixed(1)}</span>
                     <span>{minPrice.toFixed(1)}</span>
                </div>
            </div>
        );
    };

    // --- 獨立股票卡片與 終極版 Modal ---
    const StockBento = ({ code, onDelete, onSignalUpdate, apiKey }) => {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [showModal, setShowModal] = useState(false);
        const [aiResult, setAiResult] = useState({ news: null, strategy: null, levels: null, risk: null, loading: false });

        const fetchData = useCallback(async () => {
            setLoading(true);
            try {
                let chartData = null;
                const domains = ['query1.finance.yahoo.com', 'query2.finance.yahoo.com'];
                for (const domain of domains) {
                    for (const suffix of ['.TW', '.TWO']) {
                        try {
                            const res = await fetchWithProxy(`https://${domain}/v8/finance/chart/${code}${suffix}?interval=1d&range=3mo`);
                            if (res?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.length > 0) { chartData = res; break; }
                        } catch(e) {}
                    }
                    if (chartData) break;
                }
                if (!chartData) throw new Error("API fail");

                const stockName = await fetchStockName(code);
                const quote = chartData.chart.result[0].indicators.quote[0];
                const closes = (quote.close || []).filter(n => typeof n === "number");
                const opens = (quote.open || []).filter(n => typeof n === "number");
                const highs = (quote.high || []).filter(n => typeof n === "number");
                const lows = (quote.low || []).filter(n => typeof n === "number");
                const vols = (quote.volume || []).filter(n => typeof n === "number");

                const lastClose = lastValid(closes);
                const volume = lastValid(vols);
                const rsi14 = calcRSI(closes, 14);
                const rsi28 = calcRSI(closes, 28);
                const ma20 = avgTail(closes, 20);
                const trend = (lastClose >= ma20) ? 1 : -1;
                const avgV10 = avgTail(vols, 10);
                const volStrength = (volume > avgV10 * 1.1) ? 1 : -1; 
                
                const { macd, signal, hist } = calcMACD(closes);
                const fb = detectFalseBreakout(highs, lows, closes, vols);
                
                const marketTrend = 1;
                const tech = (rsi14 < 40 && rsi28 < 45) ? 0.2 : (rsi14 > 70 && rsi28 > 65) ? 0.8 : 0.5;
                let score = (0.6 * tech) + (0.2 * (trend === 1 ? 0.7 : 0.3)) + (0.1 * (volStrength === 1 ? 0.7 : 0.3)) + (0.1 * (marketTrend === 1 ? 0.7 : 0.3));
                score += (hist > 0 ? +0.05 : -0.05);
                if (fb.bear) score -= 0.15;
                if (fb.bull) score += 0.10;
                score = Math.max(0, Math.min(1, score));
                
                const conf = Math.round(score * 100);
                let signalType = 'neutral';
                if (score <= 0.35) signalType = 'buy';
                else if (score >= 0.65) signalType = 'sell';

                setData({
                    code, name: stockName, price: lastClose,
                    change: lastClose - closes[closes.length-2],
                    rsi: rsi14.toFixed(1), conf, signalType,
                    details: { ma20, hist, macd, signalLine: signal, volume: volume, fb, avgV10, volStrength },
                    history: { opens, highs, lows, closes }
                });
                if(onSignalUpdate) onSignalUpdate(code, signalType);
            } catch (err) { console.error(err); } finally { setLoading(false); }
        }, [code, onSignalUpdate]);

        useEffect(() => { fetchData(); }, [fetchData]);

        const runAI = async (type) => {
            if (!apiKey) return alert("請先在首頁設定輸入 Gemini API Key");
            setAiResult(prev => ({ ...prev, loading: true }));
            try {
                let prompt = "";
                if (type === 'news') prompt = `簡述 ${data.name} (${data.code}) 近期重大新聞與財報重點 (50字內)。`;
                if (type === 'strategy') prompt = `基於 ${data.name} 技術面: 收盤${data.price}, RSI ${data.rsi}, MACD ${data.details.hist>0?'多':'空'}, 給出短線操作建議 (50字內)。`;
                if (type === 'levels') prompt = `根據 ${data.name} 數據：收盤 ${data.price}。預測短線「關鍵支撐」與「關鍵壓力」。範例：支撐 100 / 壓力 110。30字內。`;
                if (type === 'risk') prompt = `根據 ${data.name}：RSI ${data.rsi}, MACD ${data.details.hist>0?'多':'空'}。評估短線風險等級（低/中/高）並簡述原因。30字內。`;
                
                const res = await callGeminiApi(apiKey, prompt, "你是一位專業簡潔的台股分析師", type === 'news');
                setAiResult(prev => ({ ...prev, [type]: res.text }));
            } catch (e) { alert(e.message); } finally { setAiResult(prev => ({ ...prev, loading: false })); }
        };

        if (loading || !data) return (
            <div className="col-span-2 md:col-span-2 xl:col-span-2 bg-apple-card rounded-[32px] border border-apple-border p-6 h-48 animate-pulse flex flex-col justify-between">
                <div className="h-6 bg-gray-800 rounded w-1/2"></div>
                <div className="h-10 bg-gray-800 rounded w-3/4"></div>
            </div>
        );

        const isUp = data.change >= 0;
        const gradientClass = isUp ? 'bg-gradient-red' : 'bg-gradient-green'; 
        const shadowClass = isUp ? 'drop-shadow-[0_0_15px_rgba(255,106,0,0.4)]' : 'drop-shadow-[0_0_15px_rgba(42,245,152,0.4)]';
        
        let signalText = "觀望"; let signalColor = "text-apple-subtext";
        if (data.signalType === 'buy') { signalText = "買進"; signalColor = "bg-gradient-blue text-gradient font-bold drop-shadow-[0_0_10px_rgba(10,132,255,0.4)]"; }
        if (data.signalType === 'sell') { signalText = "賣出"; signalColor = "bg-gradient-orange text-gradient font-bold drop-shadow-[0_0_10px_rgba(255,159,10,0.4)]"; }

        const hasAiResult = aiResult.news || aiResult.strategy || aiResult.levels || aiResult.risk;

        return (
            <>
                {/* --- 外部卡片：加入 shrink-0 預防字體裁切 --- */}
                <div onClick={() => setShowModal(true)} className="col-span-2 md:col-span-2 xl:col-span-2 bg-apple-card rounded-[32px] border border-apple-border p-6 flex flex-col justify-between relative overflow-hidden bento-card group cursor-pointer">
                    <button onClick={(e) => { e.stopPropagation(); onDelete(code); }} className="absolute top-4 right-4 text-gray-600 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity z-10">
                        <XCircle size={18} />
                    </button>
                    <div className="flex justify-between items-start">
                        <div>
                            <div className="text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">代號 {data.code}</div>
                            <div className="text-xl font-bold tracking-tight text-white">{data.name}</div>
                        </div>
                        <div className="text-right shrink-0">
                            <div className="text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">RSI 強度</div>
                            <div className="text-lg font-bold text-white">{data.rsi}</div>
                        </div>
                    </div>
                    <div className="mt-6 flex justify-between items-end">
                        <div className="shrink-0">
                            <div className={`text-4xl font-black tracking-tighter ${gradientClass} text-gradient ${shadowClass} pb-2`}>
                                {data.price.toFixed(2)}
                            </div>
                            <div className={`text-sm font-bold mt-1 ${isUp ? 'text-red-400' : 'text-green-400'}`}>
                                {isUp ? '▲' : '▼'} {Math.abs(data.change).toFixed(2)}
                            </div>
                        </div>
                        <div className="text-right shrink-0">
                            <div className="text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">AI 判定</div>
                            {/* 加入 leading-normal 與 pb-1 完美解決裁切問題 */}
                            <div className={`text-xl font-black leading-normal pb-1 ${signalColor}`}>{signalText}</div>
                        </div>
                    </div>
                </div>

                {/* --- 🌟 12x6 網格：終極無裁切修復版 🌟 --- */}
                {showModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4 lg:p-6 animate-fade-in">
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-xl" onClick={() => setShowModal(false)}></div>
                        
                        <div className="w-full h-[96vh] max-w-[1800px] flex flex-col relative z-10 animate-scale-in">
                            
                            <button onClick={() => setShowModal(false)} className="absolute -top-1 -right-1 md:top-2 md:right-2 z-50 bg-[#151516] border border-white/10 text-gray-400 hover:text-white p-2 md:p-3 rounded-full shadow-2xl transition-transform active:scale-90">
                                <X size={20}/>
                            </button>

                            <div className="flex-1 w-full h-full grid grid-cols-2 md:grid-cols-4 lg:grid-cols-12 lg:grid-rows-6 gap-3 lg:gap-4 overflow-y-auto lg:overflow-hidden no-scrollbar pt-12 lg:pt-0 pb-6 lg:pb-0">
                                
                                {/* 1. Hero 標題與股價 [4列 x 2行] */}
                                <div className="col-span-2 md:col-span-4 lg:col-span-4 lg:row-span-2 bg-[#151516] border border-white/5 rounded-[28px] p-5 lg:p-6 flex flex-col justify-between items-start bento-card relative overflow-hidden">
                                    <div className={`absolute top-0 right-0 w-48 h-48 rounded-full mix-blend-screen filter blur-[60px] opacity-20 pointer-events-none ${isUp ? 'bg-red-500' : 'bg-green-500'}`}></div>

                                    <div className="relative z-10 w-full mb-1 shrink-0">
                                        <div className="text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">Stock Info</div>
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-3xl lg:text-4xl 2xl:text-5xl font-black text-white tracking-tight">{data.name}</h2>
                                            <span className="bg-white/10 text-white/80 px-2 py-1 rounded-md text-xs font-bold border border-white/10">{data.code}</span>
                                        </div>
                                    </div>
                                    <div className="relative z-10 w-full mb-1 shrink-0">
                                        <div className={`text-[48px] lg:text-[64px] 2xl:text-[76px] leading-none font-black tracking-tighter ${gradientClass} text-gradient ${shadowClass} pb-2`}>
                                            {data.price.toFixed(2)}
                                        </div>
                                        <div className={`text-lg font-bold mt-1 ${isUp ? 'text-red-400' : 'text-green-400'}`}>
                                            {isUp ? '▲' : '▼'} {Math.abs(data.change).toFixed(2)}
                                        </div>
                                    </div>
                                    {/* 修正：加入 shrink-0、leading-normal、pt-1 與 pb-2 防止字體擠壓裁切 */}
                                    <div className="relative z-10 w-full border-t border-white/10 pt-2 shrink-0">
                                        <div className="text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">AI 戰略判定</div>
                                        <div className={`text-2xl 2xl:text-3xl font-black leading-normal pt-1 pb-2 ${signalColor}`}>{signalText}</div>
                                    </div>
                                </div>

                                {/* 2-5. 指標小卡 [2列 x 1行 各自] */}
                                <div className="col-span-1 lg:col-span-2 lg:row-span-1 bg-[#151516] border border-white/5 rounded-[28px] p-4 flex flex-col justify-center items-center bento-card text-center shrink-0">
                                    <div className="text-[10px] lg:text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">RSI (14)</div>
                                    <div className="text-2xl lg:text-3xl font-black text-white">{data.rsi}</div>
                                </div>
                                <div className="col-span-1 lg:col-span-2 lg:row-span-1 bg-[#151516] border border-white/5 rounded-[28px] p-4 flex flex-col justify-center items-center bento-card text-center shrink-0">
                                    <div className="text-[10px] lg:text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">AI Conf.</div>
                                    <div className="text-2xl lg:text-3xl font-black text-white">{data.conf}</div>
                                </div>
                                <div className="col-span-1 lg:col-span-2 lg:row-span-1 bg-[#151516] border border-white/5 rounded-[28px] p-4 flex flex-col justify-center items-center bento-card text-center shrink-0">
                                    <div className="text-[10px] lg:text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">MA20 月線</div>
                                    <div className="text-xl lg:text-2xl font-bold text-white">{data.details.ma20.toFixed(2)}</div>
                                </div>
                                <div className="col-span-1 lg:col-span-2 lg:row-span-1 bg-[#151516] border border-white/5 rounded-[28px] p-4 flex flex-col justify-center items-center bento-card text-center shrink-0">
                                    <div className="text-[10px] lg:text-[11px] font-bold text-apple-subtext uppercase tracking-widest mb-1">Volume</div>
                                    <div className={`text-xl lg:text-2xl font-bold ${data.details.volStrength === 1 ? 'text-red-400' : 'text-green-400'}`}>
                                        {Math.floor(data.details.volume/1000)}k
                                    </div>
                                </div>

                                {/* 6. 滿版無縫 K 線圖 [8列 x 3行] */}
                                <div className="col-span-2 md:col-span-4 lg:col-span-8 lg:row-span-3 bg-[#151516] border border-white/5 rounded-[28px] p-5 lg:p-6 bento-card flex flex-col min-h-[250px] lg:min-h-0">
                                    <div className="flex justify-between items-center mb-3 flex-none shrink-0">
                                        <div className="text-[11px] lg:text-[12px] font-bold text-apple-subtext uppercase tracking-widest">K-Line Chart</div>
                                        <button onClick={(e) => { e.stopPropagation(); fetchData(); }} className="text-apple-subtext hover:text-white flex items-center gap-1 text-xs font-bold transition-colors">
                                            <RefreshCw size={12}/> Update
                                        </button>
                                    </div>
                                    <div className="flex-1 w-full relative">
                                        <CandlestickChart data={data.history} />
                                    </div>
                                </div>

                                {/* 7. MACD 詳細數據 [4列 x 1行] */}
                                <div className="col-span-2 md:col-span-2 lg:col-span-4 lg:row-span-1 bg-[#151516] border border-white/5 rounded-[28px] p-5 flex flex-col justify-center bento-card shrink-0">
                                    <div className="flex justify-between items-center mb-2">
                                        <div className="text-[11px] font-bold text-apple-subtext uppercase tracking-widest">MACD</div>
                                        <div className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${data.details.hist > 0 ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`}>
                                            {data.details.macd > data.details.signalLine ? '黃金交叉' : '死亡交叉'}
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <div className="text-[10px] text-gray-500 mb-0.5 uppercase font-bold">DIF</div>
                                            <div className="text-xl lg:text-2xl font-bold text-white">{data.details.macd.toFixed(2)}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] text-gray-500 mb-0.5 uppercase font-bold">9EMA</div>
                                            <div className="text-xl lg:text-2xl font-bold text-white">{data.details.signalLine.toFixed(2)}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 8. 快速操作 [4列 x 1行] - 和 AI 按鈕交換位置，完美填補左下角 */}
                                <div className="col-span-2 md:col-span-2 lg:col-span-4 lg:row-span-1 bg-[#151516] border border-white/5 rounded-[28px] p-4 flex flex-col justify-center bento-card text-center gap-2 shrink-0">
                                    <div className="grid grid-cols-2 gap-3 h-full">
                                        <div className="flex items-center justify-center gap-2 bg-white/5 rounded-[20px] p-2 border border-white/5">
                                            <Clock size={16} className="text-gray-400"/>
                                            <span className="text-xs font-bold text-gray-400">{new Date().toLocaleDateString()}</span>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); onDelete(code); setShowModal(false); }} className="flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 rounded-[20px] p-2 transition-colors border border-red-500/10 group">
                                            <Trash2 size={16} className="text-red-400 group-active:scale-90 transition-transform"/>
                                            <span className="text-xs font-bold text-red-400">刪除監控</span>
                                        </button>
                                    </div>
                                </div>

                                {/* 9. AI 戰略按鈕 [4列 x 2行 的內部 2x2 網格] */}
                                <div className="col-span-2 md:col-span-4 lg:col-span-4 lg:row-span-2 grid grid-cols-2 grid-rows-2 gap-3 lg:gap-4 shrink-0">
                                    <button onClick={() => runAI('news')} disabled={aiResult.loading} className="bg-[#151516] border border-blue-500/20 hover:bg-blue-500/10 rounded-[28px] p-4 flex flex-col items-center justify-center gap-2 transition-colors bento-card active:scale-95">
                                        <Sparkles size={24} className="text-blue-400"/>
                                        <span className="text-[13px] font-bold text-blue-400">新聞摘要</span>
                                    </button>
                                    <button onClick={() => runAI('strategy')} disabled={aiResult.loading} className="bg-[#151516] border border-blue-500/20 hover:bg-blue-500/10 rounded-[28px] p-4 flex flex-col items-center justify-center gap-2 transition-colors bento-card active:scale-95">
                                        <Brain size={24} className="text-blue-400"/>
                                        <span className="text-[13px] font-bold text-blue-400">AI 診斷</span>
                                    </button>
                                    <button onClick={() => runAI('levels')} disabled={aiResult.loading} className="bg-[#151516] border border-orange-500/20 hover:bg-orange-500/10 rounded-[28px] p-4 flex flex-col items-center justify-center gap-2 transition-colors bento-card active:scale-95">
                                        <Target size={24} className="text-orange-400"/>
                                        <span className="text-[13px] font-bold text-orange-400">支撐壓力</span>
                                    </button>
                                    <button onClick={() => runAI('risk')} disabled={aiResult.loading} className="bg-[#151516] border border-purple-500/20 hover:bg-purple-500/10 rounded-[28px] p-4 flex flex-col items-center justify-center gap-2 transition-colors bento-card active:scale-95">
                                        <ShieldAlert size={24} className="text-purple-400"/>
                                        <span className="text-[13px] font-bold text-purple-400">風險評估</span>
                                    </button>
                                </div>

                                {/* 10. AI 輸出結果終端機 [8列 x 2行] */}
                                <div className="col-span-2 md:col-span-4 lg:col-span-8 lg:row-span-2 bg-[#151516] border border-white/5 rounded-[28px] p-5 lg:p-6 bento-card overflow-y-auto no-scrollbar relative min-h-[120px]">
                                    {!hasAiResult ? (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-600 opacity-40">
                                            <Sparkles size={32} className="mb-2" />
                                            <div className="font-bold uppercase tracking-widest text-[11px]">Awaiting AI Directive ...</div>
                                        </div>
                                    ) : (
                                        <div className="space-y-4 animate-fade-in relative z-10">
                                            {aiResult.news && (
                                                <div><div className="text-[11px] font-bold text-blue-400 uppercase tracking-widest mb-1 flex items-center gap-1.5"><Sparkles size={14}/> 新聞重點</div><p className="text-[13px] lg:text-[14px] text-gray-300 leading-relaxed font-medium">{aiResult.news}</p></div>
                                            )}
                                            {aiResult.strategy && (
                                                <div className={aiResult.news ? "pt-3 border-t border-white/10" : ""}><div className="text-[11px] font-bold text-blue-400 uppercase tracking-widest mb-1 flex items-center gap-1.5"><Brain size={14}/> 策略建議</div><p className="text-[13px] lg:text-[14px] text-gray-300 leading-relaxed font-medium">{aiResult.strategy}</p></div>
                                            )}
                                            {aiResult.levels && (
                                                <div className={(aiResult.news || aiResult.strategy) ? "pt-3 border-t border-white/10" : ""}><div className="text-[11px] font-bold text-orange-400 uppercase tracking-widest mb-1 flex items-center gap-1.5"><Target size={14}/> 關鍵價位</div><p className="text-[13px] lg:text-[14px] text-gray-300 font-medium">{aiResult.levels}</p></div>
                                            )}
                                            {aiResult.risk && (
                                                <div className={(aiResult.news || aiResult.strategy || aiResult.levels) ? "pt-3 border-t border-white/10" : ""}><div className="text-[11px] font-bold text-purple-400 uppercase tracking-widest mb-1 flex items-center gap-1.5"><ShieldAlert size={14}/> 風險評估</div><p className="text-[13px] lg:text-[14px] text-gray-300 font-medium">{aiResult.risk}</p></div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                
                            </div>
                        </div>
                    </div>
                )}
            </>
        );
    };

    const App = () => {
      const [inputCode, setInputCode] = useState("");
      const [stocks, setStocks] = useState(["2330", "2317", "0050", "2454"]);
      const [stockSignals, setStockSignals] = useState({});
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("gemini_api_key") || "");

      const handleSignalUpdate = useCallback((code, type) => { setStockSignals(prev => ({ ...prev, [code]: type })); }, []);
      const removeStock = (code) => { setStocks(prev => prev.filter(s => s !== code)); };

      const stats = useMemo(() => {
          let buyCount = 0; let sellCount = 0;
          Object.values(stockSignals).forEach(sig => { if (sig === 'buy') buyCount++; if (sig === 'sell') sellCount++; });
          return { total: stocks.length, buyCount, sellCount };
      }, [stocks, stockSignals]);

      return (
        <div className="min-h-screen bg-apple-bg p-4 md:p-10 font-sans">
            <div className="max-w-[1400px] mx-auto grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-4 md:gap-6">
                
                <div className="col-span-2 md:col-span-4 xl:col-span-4 row-span-2 bg-apple-card rounded-[32px] border border-apple-border p-8 relative flex flex-col justify-center items-center overflow-hidden bento-card">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-purple-600 rounded-full mix-blend-screen filter blur-[80px] opacity-40"></div>
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-blue-500 rounded-full mix-blend-screen filter blur-[60px] opacity-30"></div>
                    <div className="relative z-10 text-center">
                        <Brain size={48} className="mx-auto text-white mb-4 opacity-90"/>
                        <h1 className="text-5xl md:text-6xl font-black tracking-tighter text-white mb-2">阿彬<span className="bg-gradient-m1 text-gradient">戰情室</span></h1>
                        <p className="text-apple-subtext font-medium tracking-wide">TWSE 終極 AI 監控矩陣</p>
                    </div>
                </div>

                <div className="col-span-2 md:col-span-2 xl:col-span-2 bg-apple-card rounded-[32px] border border-apple-border p-6 flex flex-col justify-center bento-card">
                    <div className="text-[12px] font-bold text-apple-subtext uppercase tracking-widest mb-3">AI 引擎授權金鑰</div>
                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem("gemini_api_key", e.target.value); }} placeholder="輸入 Gemini API Key" className="w-full bg-black border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500/50 transition-colors" />
                </div>

                <div className="col-span-2 md:col-span-2 xl:col-span-2 bg-apple-card rounded-[32px] border border-apple-border p-6 flex flex-col justify-center bento-card">
                    <div className="text-[12px] font-bold text-apple-subtext uppercase tracking-widest mb-3">Track New Stock</div>
                    <form onSubmit={(e) => { e.preventDefault(); if(inputCode) { setStocks([inputCode, ...stocks]); setInputCode(""); } }} className="flex gap-2">
                        <input type="text" value={inputCode} onChange={e => setInputCode(e.target.value)} placeholder="代號 (如: 2330)" className="w-full bg-black border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-white/30" />
                        <button type="submit" className="bg-white text-black font-bold px-4 py-2.5 rounded-xl hover:bg-gray-200 transition-colors text-sm">Add</button>
                    </form>
                </div>

                <div className="col-span-1 md:col-span-1 xl:col-span-1 bg-apple-card rounded-[32px] border border-apple-border p-6 flex flex-col justify-center items-center bento-card text-center">
                    <div className="text-4xl font-black text-white">{stats.total}</div>
                    <div className="text-[10px] font-bold text-apple-subtext uppercase tracking-widest mt-2 leading-tight">Total<br/>Tracked</div>
                </div>
                <div className="col-span-1 md:col-span-1 xl:col-span-1 bg-apple-card rounded-[32px] border border-apple-border p-6 flex flex-col justify-center items-center bento-card text-center">
                    <div className="text-4xl font-black bg-gradient-blue text-gradient drop-shadow-[0_0_10px_rgba(10,132,255,0.4)]">{stats.buyCount}</div>
                    <div className="text-[10px] font-bold text-apple-subtext uppercase tracking-widest mt-2 leading-tight">Buy<br/>Signals</div>
                </div>
                <div className="col-span-2 md:col-span-2 xl:col-span-2 bg-apple-card rounded-[32px] border border-apple-border p-6 flex flex-col justify-center items-center bento-card text-center">
                    <div className="text-[12px] font-bold text-apple-subtext uppercase tracking-widest mb-1">Sell Alerts</div>
                    <div className="text-4xl font-black bg-gradient-orange text-gradient drop-shadow-[0_0_10px_rgba(255,159,10,0.4)]">{stats.sellCount}</div>
                </div>

                {stocks.map(code => (
                    <StockBento key={code} code={code} onDelete={removeStock} onSignalUpdate={handleSignalUpdate} apiKey={apiKey} />
                ))}

            </div>
            
            <div className="text-center mt-16 pb-8 text-xs text-apple-subtext font-medium tracking-wide">
                Designed for Abin. Powered by AI Technical Analysis.
            </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
